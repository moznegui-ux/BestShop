<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — BestShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#f0f4ff 0%,#e8f5f0 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .card {
      background:#fff; border-radius:24px;
      box-shadow:0 20px 60px rgba(0,0,0,0.1);
      padding:40px; width:100%; max-width:420px;
    }
    .logo { text-align:center; margin-bottom:28px; }
    .logo span.best { color:#2B7FDD; font-size:26px; font-weight:800; }
    .logo span.shop { color:#16A472; font-size:26px; font-weight:800; }
    .logo sup { font-size:11px; color:#999; }
    .tabs { display:flex; background:#f5f7fa; border-radius:12px; padding:4px; margin-bottom:24px; }
    .tab {
      flex:1; padding:10px; text-align:center; border-radius:10px;
      font-size:14px; font-weight:600; cursor:pointer;
      color:#888; transition:all 0.2s;
    }
    .tab.active { background:#fff; color:#1a1a2e; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .form { display:none; }
    .form.active { display:block; }
    .input-group { margin-bottom:16px; }
    .input-group label { display:block; font-size:13px; font-weight:600; color:#444; margin-bottom:6px; }
    .input-group input {
      width:100%; padding:13px 16px; border:2px solid #eee;
      border-radius:12px; font-size:14px; font-family:'Inter',sans-serif;
      outline:none; transition:border-color 0.2s;
    }
    .input-group input:focus { border-color:#2B7FDD; }
    .btn {
      width:100%; padding:14px; border:none; border-radius:12px;
      font-size:15px; font-weight:700; cursor:pointer;
      font-family:'Inter',sans-serif; transition:opacity 0.2s,transform 0.1s;
      margin-top:4px;
    }
    .btn:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-primary { background:linear-gradient(135deg,#2B7FDD,#16A472); color:#fff; }
    .error-msg {
      display:none; background:#fff0f0; border:1px solid #ffcccc;
      border-radius:10px; padding:12px 16px; color:#cc0000;
      font-size:13px; margin-bottom:14px; text-align:center;
    }
    .error-msg.show { display:block; }
    .success-msg {
      display:none; background:#f0fff8; border:1px solid #b3f0d8;
      border-radius:10px; padding:12px 16px; color:#00875a;
      font-size:13px; margin-bottom:14px; text-align:center;
    }
    .success-msg.show { display:block; }
    .divider { text-align:center; color:#aaa; font-size:13px; margin:16px 0; position:relative; }
    .divider::before,.divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:#eee; }
    .divider::before { left:0; } .divider::after { right:0; }
    .btn-google {
      width:100%; padding:13px; border:2px solid #eee; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer; background:#fff;
      font-family:'Inter',sans-serif; display:flex; align-items:center;
      justify-content:center; gap:10px; transition:border-color 0.2s;
    }
    .btn-google:hover { border-color:#2B7FDD; }
    .back-link { display:block; text-align:center; margin-top:20px; color:#2B7FDD; text-decoration:none; font-size:14px; }
    .back-link:hover { text-decoration:underline; }
    .loading { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="best">Best</span><span class="shop">Shop</span><sup>PRO</sup>
    <div style="font-size:13px;color:#888;margin-top:4px">Your personal price comparison account</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Create Account</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- LOGIN FORM -->
  <div class="form active" id="loginForm">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com"/>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••"/>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP FORM -->
  <div class="form" id="signupForm">
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your name"/>
    </div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="your@email.com"/>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="signupPass" placeholder="Min 6 characters"/>
    </div>
    <button class="btn btn-primary" id="signupBtn" onclick="doSignup()">Create Account →</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <a href="../index.html" class="back-link">← Back to BestShop</a>
</div>

<script>
  const SUPABASE_URL = 'https://mfgmyrdlojhecasbkqnb.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mZ215cmRsb2poZWNhc2JrcW5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODY5MjksImV4cCI6MjA5MjQ2MjkyOX0.Dh6XmdpiaJWHyA0jWPGV7iz6uUpowvNpEWaMSP8ZRgo';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
    document.getElementById('loginForm').classList.toggle('active', tab==='login');
    document.getElementById('signupForm').classList.toggle('active', tab==='signup');
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
  }

  function hideMessages() {
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('successMsg').classList.remove('show');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Please wait...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'loginBtn' ? 'Sign In →' : 'Create Account →';
    }
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) { showError('Please fill in all fields.'); return; }

    setLoading('loginBtn', true);
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();
      if (data.access_token) {
        localStorage.setItem('bs_token', data.access_token);
        localStorage.setItem('bs_user', JSON.stringify({ email, id: data.user?.id, name: data.user?.user_metadata?.name || email.split('@')[0] }));
        showSuccess('✅ Welcome back! Redirecting...');
        setTimeout(() => window.location.href = '../index.html', 1200);
      } else {
        showError(data.error_description || 'Wrong email or password.');
      }
    } catch(e) { showError('Connection error. Please try again.'); }
    setLoading('loginBtn', false);
  }

  async function doSignup() {
    const name  = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pass  = document.getElementById('signupPass').value;
    if (!name || !email || !pass) { showError('Please fill in all fields.'); return; }
    if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }

    setLoading('signupBtn', true);
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, data: { name } })
      });
      const data = await res.json();
      if (data.id || data.user) {
        showSuccess('✅ Account created! Please check your email to confirm.');
      } else {
        showError(data.error_description || data.msg || 'Could not create account.');
      }
    } catch(e) { showError('Connection error. Please try again.'); }
    setLoading('signupBtn', false);
  }

  async function doGoogleLogin() {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(window.location.origin + '/index.html')}`, {
        headers: { 'apikey': SUPABASE_KEY }
      });
      window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(window.location.origin)}`;
    } catch(e) { showError('Google login unavailable.'); }
  }

  // Enter key
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginForm').classList.contains('active')) doLogin();
      else doSignup();
    }
  });

  // If already logged in redirect
  if (localStorage.getItem('bs_token')) window.location.href = '../index.html';
</script>
</body>
</html>
