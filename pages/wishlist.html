<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Wishlist — BestShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f5f7fa;min-height:100vh}
    .navbar{background:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:sticky;top:0;z-index:100}
    .back-btn{color:#2B7FDD;text-decoration:none;font-size:14px;font-weight:600}
    .logo .best{color:#2B7FDD;font-weight:800;font-size:20px}
    .logo .shop{color:#16A472;font-weight:800;font-size:20px}
    .main{max-width:1100px;margin:0 auto;padding:28px 16px}
    h1{font-size:24px;font-weight:800;margin-bottom:6px}
    .subtitle{color:#888;font-size:14px;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
    .product-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);transition:transform 0.2s,box-shadow 0.2s}
    .product-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
    .product-img{height:180px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;position:relative;padding:16px}
    .product-img img{max-width:100%;max-height:100%;object-fit:contain}
    .cat-tag{position:absolute;top:10px;left:10px;background:#D6E8FF;color:#1560A8;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
    .remove-btn{position:absolute;top:10px;right:10px;background:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);color:#E84040;font-size:14px}
    .product-info{padding:14px}
    .product-name{font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.4}
    .best-price{font-size:20px;font-weight:800;color:#16A472;margin-bottom:4px}
    .best-store{font-size:12px;color:#888;margin-bottom:12px}
    .buy-btn{width:100%;padding:10px;background:linear-gradient(135deg,#2B7FDD,#16A472);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.2s}
    .buy-btn:hover{opacity:0.9}
    .empty{text-align:center;padding:60px 20px;color:#888}
    .empty-icon{font-size:64px;margin-bottom:16px}
    .empty h2{font-size:20px;font-weight:700;color:#333;margin-bottom:8px}
    .empty a{display:inline-block;margin-top:16px;padding:12px 24px;background:linear-gradient(135deg,#2B7FDD,#16A472);color:#fff;border-radius:12px;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="logo"><span class="best">Best</span><span class="shop">Shop</span></div>
</nav>
<main class="main">
  <h1>❤️ My Wishlist</h1>
  <div class="subtitle" id="subtitle">Loading...</div>
  <div class="grid" id="grid"></div>
</main>
<script>
  const SUPABASE_URL = 'https://mfgmyrdlojhecasbkqnb.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mZ215cmRsb2poZWNhc2JrcW5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODY5MjksImV4cCI6MjA5MjQ2MjkyOX0.Dh6XmdpiaJWHyA0jWPGV7iz6uUpowvNpEWaMSP8ZRgo';

  let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');

  async function load() {
    const grid = document.getElementById('grid');
    const subtitle = document.getElementById('subtitle');

    if (wishlist.length === 0) {
      subtitle.textContent = '0 items';
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">💔</div>
        <h2>Your wishlist is empty</h2>
        <p>Save products you love by clicking the ❤️ button</p>
        <a href="../index.html">Browse Products →</a>
      </div>`;
      return;
    }

    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const all = await res.json();
    const products = all.filter(p => wishlist.includes(String(p.id)));

    subtitle.textContent = `${products.length} saved item${products.length!==1?'s':''}`;

    if (products.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">💔</div>
        <h2>No items found</h2>
        <a href="../index.html">Browse Products →</a>
      </div>`;
      return;
    }

    const storeDots = {Amazon:'#2B7FDD',Temu:'#E24B4A',AliExpress:'#F09F2E',SHEIN:'#993556',Walmart:'#16A472',Banggood:'#BA7517',LightInTheBox:'#533AB7',Zaful:'#7B3FC4'};

    products.forEach(p => {
      const prices = {Amazon:p.price_amazon,Temu:p.price_temu,AliExpress:p.price_aliexpress,SHEIN:p.price_shein,Walmart:p.price_walmart,Banggood:p.price_banggood,LightInTheBox:p.price_lightinthebox,Zaful:p.price_zaful};
      const affs   = {Amazon:p.aff_amazon,Temu:p.aff_temu,AliExpress:p.aff_aliexpress,SHEIN:p.aff_shein,Walmart:p.aff_walmart,Banggood:p.aff_banggood,LightInTheBox:p.aff_lightinthebox,Zaful:p.aff_zaful};
      const available = Object.entries(prices).filter(([k,v])=>v&&v>0).sort((a,b)=>a[1]-b[1]);
      if (!available.length) return;
      const [bestStore, bestPrice] = available[0];
      const bestAff = affs[bestStore] || '#';

      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-img">
          ${p.image_url?`<img src="${p.image_url}" onerror="this.style.display='none'"/>`:'<span style="font-size:48px">📦</span>'}
          <span class="cat-tag">${p.category||''}</span>
          <button class="remove-btn" data-id="${p.id}" title="Remove">✕</button>
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="best-price">$${bestPrice}</div>
          <div class="best-store">Best price on ${bestStore}</div>
          <button class="buy-btn" data-url="${bestAff}">Buy Now →</button>
        </div>`;

      card.querySelector('.remove-btn').addEventListener('click', e => {
        e.stopPropagation();
        const id = String(e.currentTarget.dataset.id);
        wishlist = wishlist.filter(x=>x!==id);
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        card.remove();
        subtitle.textContent = `${document.querySelectorAll('.product-card').length} saved items`;
        if (document.querySelectorAll('.product-card').length === 0) load();
      });

      card.querySelector('.buy-btn').addEventListener('click', e => {
        const url = e.currentTarget.dataset.url;
        if (url && url !== '#') window.open(url, '_blank');
      });

      grid.appendChild(card);
    });
  }

  load();
</script>
</body>
</html>
